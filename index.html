            speed: {en: 'Speed', jp: 'すばやさ', color: '#FA92B2'}
        };

        function updateLanguage(lang) {
            currentLang = lang;
            const t = TRANSLATIONS[lang];
            
            document.title = t.pageTitle;
            document.getElementById('header-title').textContent = t.heading;
            document.getElementById('main-heading').textContent = t.heading;
            document.getElementById('main-desc').innerHTML = t.desc;
            document.getElementById('label-mode').innerHTML = `<i class="fa-solid fa-map-location-dot mr-1 text-blue-500"></i>${t.selectMode}`;
            document.getElementById('btn-play-text').textContent = t.btnPlay;
            document.getElementById('loading-spinner-text').textContent = t.loading;
            
            document.getElementById('label-genus').textContent = t.lblGenus;
            document.getElementById('label-height').textContent = t.lblHeight;
            document.getElementById('label-weight').textContent = t.lblWeight;
            document.getElementById('label-abilities').textContent = t.lblAbilities;
            document.getElementById('label-stats').textContent = t.lblStats;
            
            document.getElementById('btn-share-twitter-text').textContent = t.shareX;
            document.getElementById('btn-close-prize').textContent = t.close;
            document.getElementById('btn-explorer-link-text').textContent = t.pokedex;

            const select = document.getElementById('select-mode');
            const currentVal = select.value || 'all';
            select.innerHTML = t.opts.map(o => `<option value="${o.val}">${o.text}</option>`).join('');
            select.value = currentVal;
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // ★ ポケモン本物の鳴き声（PokeAPI）を再生し、終了後に戦闘曲を流す ★
        function playPokemonCry(id) {
            if (!soundEnabled) return;
            const cryAudio = new Audio(`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${id}.ogg`);
            cryAudio.volume = 0.5;
            
            // 鳴き声が終了したタイミングで戦闘曲をループ再生開始
            cryAudio.onended = () => {
                if (currentState === STATE.REVEALED && soundEnabled) {
                    bgmBattle.volume = 0.2;
                    bgmBattle.currentTime = 0;
                    bgmBattle.play().catch(e => console.warn("戦闘BGM再生エラー", e));
                }
            };

            cryAudio.play().catch(e => {
                console.warn("鳴き声データの再生に失敗しました", e);
                // エラー時（鳴き声がない等）は、1秒後に戦闘曲を再生
                setTimeout(() => {
                    if (currentState === STATE.REVEALED && soundEnabled) {
                        bgmBattle.volume = 0.2;
                        bgmBattle.currentTime = 0;
                        bgmBattle.play().catch(err => console.warn(err));
                    }
                }, 1000);
            });
        }

        function playAudio(type) {
            if (!soundEnabled) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'click') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
                    gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'motor') {
                    osc.type = 'square';
                    for(let i=0; i<10; i++) {
                        osc.frequency.setValueAtTime(400, now + i*0.1);
                        gain.gain.setValueAtTime(0.05, now + i*0.1);
                        gain.gain.setValueAtTime(0, now + i*0.1 + 0.05);
                    }
                    osc.start(now); osc.stop(now + 1.0);
                } else if (type === 'pop') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'success') {
                    osc.type = 'square';
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    let time = now;
                    notes.forEach((freq, i) => {
                        osc.frequency.setValueAtTime(freq, time);
                        time += (i === notes.length - 1) ? 0.4 : 0.1;
                    });
                    gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, time);
                    osc.start(now); osc.stop(time);
                }
            } catch (e) { console.warn("Audio error: ", e); }
        }

        // サウンドボタンのオンオフ処理
        document.getElementById('sound-toggle').addEventListener('click', () => { 
            soundEnabled = !soundEnabled; 
            document.getElementById('sound-icon').className = soundEnabled ? "fa-solid fa-volume-high text-red-500" : "fa-solid fa-volume-xmark text-slate-400"; 
            
            // BGMの再生/停止を連動させる
            if (soundEnabled) {
                if (currentState === STATE.REVEALED) {
                    bgmBattle.play().catch(e=>{});
                } else if (isOpStarted) {
                    bgmOp.play().catch(e=>{});
                }
            } else {
                bgmOp.pause();
                bgmBattle.pause();
            }
        });

        document.getElementById('lang-toggle').addEventListener('click', () => { playAudio('click'); updateLanguage(currentLang === 'en' ? 'jp' : 'en'); });
        
        function toggleModal(modal, show) {
            if (show) { modal.classList.remove('hidden'); setTimeout(() => modal.classList.add('opacity-100'), 10); } 
            else { modal.classList.remove('opacity-100'); setTimeout(() => modal.classList.add('hidden'), 300); }
        }

        function playGashaponRotation() {
            currentState = STATE.ROLLING; playAudio('motor');
            const machine = document.getElementById('gashapon-machine');
            machine.classList.add('animate-shake');
            document.getElementById('crank-handle').style.transform = "rotate(720deg)";
            document.getElementById('crank-handle').style.transition = "transform 1.2s cubic-bezier(0.25, 1, 0.5, 1)";

            setTimeout(() => {
                machine.classList.remove('animate-shake'); currentState = STATE.HAS_CAPSULE; playAudio('pop');
                const cap = document.getElementById('dispensed-capsule');
                cap.classList.remove('hidden'); cap.classList.add('animate-drop', 'ball-glow');
                cap.onclick = () => triggerReveal();
            }, 1200);
        }

        async function copyImageToClipboard(imgUrl) {
            try {
                const response = await fetch(imgUrl, { mode: 'cors' });
                const blob = await response.blob();
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                return true;
            } catch (err) {
                try {
                    const img = new Image(); img.crossOrigin = "anonymous";
                    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = imgUrl; });
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    return true;
                } catch (e) { return false; }
            }
        }

        async function triggerReveal() {
            playAudio('click');
            
            let targetMode = document.getElementById('select-mode').value;
            let minId = 1, maxId = 1025;
            if(targetMode === 'kanto') { minId = 1; maxId = 151; }
            else if(targetMode === 'johto') { minId = 152; maxId = 251; }
            else if(targetMode === 'hoenn') { minId = 252; maxId = 386; }
            else if(targetMode === 'sinnoh') { minId = 387; maxId = 493; }
            else if(targetMode === 'unova') { minId = 494; maxId = 649; }
            else if(targetMode === 'kalos') { minId = 650; maxId = 721; }
            else if(targetMode === 'alola') { minId = 722; maxId = 809; }
            else if(targetMode === 'galar') { minId = 810; maxId = 898; }
            else if(targetMode === 'paldea') { minId = 906; maxId = 1025; }

            const targetId = Math.floor(Math.random() * (maxId - minId + 1)) + minId;

            // 初期化
            document.getElementById('prize-name').textContent = TRANSLATIONS[currentLang].loading;
            document.getElementById('prize-rarity').textContent = "No. ???";
            document.getElementById('prize-genus-detail').textContent = "--";
            document.getElementById('prize-types').innerHTML = "";
            document.getElementById('prize-height').textContent = "-- m";
            document.getElementById('prize-weight').textContent = "-- kg";
            document.getElementById('prize-flavor-text').textContent = "...";
            document.getElementById('prize-abilities').innerHTML = "";
            document.getElementById('stats-container').innerHTML = "";

            const pImg = document.getElementById('prize-img');
            const loader = document.getElementById('prize-img-loader');
            pImg.classList.remove('opacity-100', 'scale-100'); pImg.classList.add('opacity-0', 'scale-90');
            loader.classList.remove('hidden', 'opacity-0');

            toggleModal(document.getElementById('prize-modal'), true);
            currentState = STATE.REVEALED;

            const cap = document.getElementById('dispensed-capsule');
            cap.classList.add('hidden'); cap.classList.remove('animate-drop', 'ball-glow');
            document.getElementById('crank-handle').style.transform = "rotate(0deg)";
            document.getElementById('crank-handle').style.transition = "none";

            try {
                // PokeAPIからデータ取得
                const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${targetId}`);
                const pokeData = await pokeRes.json();
                
                const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${targetId}`);
                const speciesData = await speciesRes.json();
                
                // 名前
                let jpNameObj = speciesData.names.find(n => n.language.name === "ja-Hrkt") || speciesData.names.find(n => n.language.name === "ja");
                let enNameObj = speciesData.names.find(n => n.language.name === "en");
                let jpName = jpNameObj ? jpNameObj.name : pokeData.name;
                let enName = enNameObj ? enNameObj.name : pokeData.name;
                let finalName = currentLang === 'en' ? (enName.charAt(0).toUpperCase() + enName.slice(1)) : jpName;
                
                // 分類（Genus）
                let jpGenusObj = speciesData.genera.find(g => g.language.name === "ja-Hrkt") || speciesData.genera.find(g => g.language.name === "ja");
                let enGenusObj = speciesData.genera.find(g => g.language.name === "en");
                let jpGenus = jpGenusObj ? jpGenusObj.genus : "";
                let enGenus = enGenusObj ? enGenusObj.genus : "";
                let finalGenus = currentLang === 'en' ? enGenus : jpGenus;

                // 図鑑説明文
                let flavorText = "";
                const entries = speciesData.flavor_text_entries;
                for (let i = entries.length - 1; i >= 0; i--) {
                    if (currentLang === 'en' && entries[i].language.name === 'en') {
                        flavorText = entries[i].flavor_text;
                        break;
                    } else if (currentLang === 'jp' && (entries[i].language.name === 'ja-Hrkt' || entries[i].language.name === 'ja')) {
                        flavorText = entries[i].flavor_text;
                        break;
                    }
                }
                if (!flavorText) flavorText = currentLang === 'en' ? "No data available." : "データがありません。";
                flavorText = flavorText.replace(/[\n\f\r]/g, ' ');

                // タイプ
                const typesHtml = pokeData.types.map(t => {
                    const typeName = t.type.name;
                    const displayType = currentLang === 'en' ? typeName.toUpperCase() : (TYPE_JP[typeName] || typeName.toUpperCase());
                    const color = TYPE_COLORS[typeName] || {bg: '#777', text: '#fff'};
                    return `<span class="px-2 py-0.5 rounded text-[10px] font-bold shadow-sm" style="background-color:${color.bg}; color:${color.text}; border: 1px solid rgba(0,0,0,0.1)">${displayType}</span>`;
                }).join('');

                // 高さ・重さ
                const heightM = (pokeData.height / 10).toFixed(1);
                const weightKg = (pokeData.weight / 10).toFixed(1);

                // 特性
                const abilitiesHtmlPromises = pokeData.abilities.map(async (a) => {
                    let abName = a.ability.name.replace('-', ' ');
                    if (currentLang === 'en') {
                        abName = abName.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
                        const suffix = a.is_hidden ? ' <span class="text-[10px] text-slate-400 font-normal">(Hidden)</span>' : '';
                        return `<span class="px-2 py-1 bg-slate-100 rounded-lg text-xs border border-slate-200">${abName}${suffix}</span>`;
                    } else {
                        try {
                            const abRes = await fetch(a.ability.url);
                            const abData = await abRes.json();
                            const jpObj = abData.names.find(n => n.language.name === 'ja-Hrkt') || abData.names.find(n => n.language.name === 'ja');
                            const jpAb = jpObj ? jpObj.name : abName;
                            const suffix = a.is_hidden ? ' <span class="text-[10px] text-slate-400 font-normal">(夢)</span>' : '';
                            return `<span class="px-2 py-1 bg-slate-100 rounded-lg text-xs border border-slate-200">${jpAb}${suffix}</span>`;
                        } catch(e) { 
                            return `<span class="px-2 py-1 bg-slate-100 rounded-lg text-xs border border-slate-200">${abName}</span>`; 
                        }
                    }
                });
                const abilitiesHtmlArr = await Promise.all(abilitiesHtmlPromises);

                // 種族値
                const MAX_STAT = 255;
                const statsHtml = pokeData.stats.map(s => {
                    const statKey = s.stat.name;
                    const val = s.base_stat;
                    const label = STAT_LABELS[statKey] ? STAT_LABELS[statKey][currentLang] : statKey.toUpperCase();
                    const color = STAT_LABELS[statKey] ? STAT_LABELS[statKey].color : '#aaa';
                    const pct = Math.min(100, (val / MAX_STAT) * 100);
                    return `
                        <div class="flex items-center text-xs">
                            <span class="w-16 font-bold text-slate-500">${label}</span>
                            <span class="w-8 text-right font-pixel font-bold mr-2 text-slate-700">${val}</span>
                            <div class="flex-grow h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full rounded-full stat-bar-fill" style="width: 0%; background-color: ${color};" data-width="${pct}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');

                // 画像URL
                const imgUrl = (pokeData.sprites.other && pokeData.sprites.other["official-artwork"].front_default) 
                             ? pokeData.sprites.other["official-artwork"].front_default 
                             : pokeData.sprites.front_default;

                const preloaderImg = new Image();
                preloaderImg.crossOrigin = "anonymous";
                
                const finalizeReveal = () => {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.classList.add('hidden'), 400); 
                    
                    pImg.src = imgUrl;
                    pImg.classList.remove('opacity-0', 'scale-90'); pImg.classList.add('opacity-100', 'scale-100');
                    
                    document.getElementById('prize-name').textContent = finalName;
                    document.getElementById('prize-genus-detail').textContent = finalGenus || "--";
                    document.getElementById('prize-rarity').textContent = `No. ${targetId.toString().padStart(4, '0')}`;
                    document.getElementById('prize-types').innerHTML = typesHtml;
                    document.getElementById('prize-height').textContent = `${heightM} m`;
                    document.getElementById('prize-weight').textContent = `${weightKg} kg`;
                    document.getElementById('prize-flavor-text').textContent = flavorText;
                    document.getElementById('prize-abilities').innerHTML = abilitiesHtmlArr.join('');
                    
                    const statsContainer = document.getElementById('stats-container');
                    statsContainer.innerHTML = statsHtml;
                    
                    setTimeout(() => {
                        statsContainer.querySelectorAll('.stat-bar-fill').forEach(bar => {
                            bar.style.width = bar.getAttribute('data-width');
                        });
                    }, 50);

                    const officialUrl = currentLang === 'en' ? `https://www.pokemon.com/us/pokedex/${targetId}` : `https://zukan.pokemon.co.jp/detail/${targetId}`;
                    document.getElementById('btn-explorer-link').href = officialUrl;
                    
                    lastWonItemImageUrl = imgUrl; lastWonItemName = finalName;

                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#ef4444', '#ffffff', '#eab308'] });
                    
                    // ★ オープニング曲を一時停止し、ファンファーレ音 → 本物の鳴き声 → 戦闘曲の順に再生 ★
                    bgmOp.pause();
                    playAudio('success');
                    setTimeout(() => {
                        playPokemonCry(targetId);
                    }, 600);
                };

                preloaderImg.onload = finalizeReveal;
                preloaderImg.onerror = finalizeReveal; 
                preloaderImg.src = imgUrl; 

            } catch (err) {
                console.error(err);
                document.getElementById('prize-name').textContent = "ERROR";
                loader.classList.add('opacity-0'); setTimeout(() => loader.classList.add('hidden'), 500); 
            }
        }

        // X シェアボタン
        document.getElementById('btn-share-twitter').addEventListener('click', async () => {
            if (!lastWonItemImageUrl || !lastWonItemName) return;
            const btnTextElement = document.getElementById('btn-share-twitter-text');
            const originalText = btnTextElement.textContent;

            btnTextElement.textContent = currentLang === 'en' ? "Copying..." : "コピー中...";
            playAudio('click');

            await copyImageToClipboard(lastWonItemImageUrl);
            btnTextElement.textContent = originalText;

            const siteUrl = window.location.href;
            const tweetText = currentLang === 'en' 
                ? `I caught "${lastWonItemName}" with the Pokémon Gacha! 🔴⚪️\n\nPlay for free:`
                : `ポケモン ガシャポンで「${lastWonItemName}」をゲットしました！🔴⚪️\n\n無料で遊ぶ：`;
                
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(siteUrl)}`, '_blank');
        });

        function handleStartGacha() {
            if (currentState === STATE.ROLLING || currentState === STATE.HAS_CAPSULE) return;
            playAudio('click'); playGashaponRotation();
        }

        document.getElementById('btn-play').addEventListener('click', handleStartGacha);
        document.getElementById('crank-handle').addEventListener('click', () => { if (currentState === STATE.IDLE) handleStartGacha(); });
        
        // ★ 閉じるボタンを押したときの処理 ★
        document.getElementById('btn-close-prize').addEventListener('click', () => {
            playAudio('click');
            toggleModal(document.getElementById('prize-modal'), false);
            const cap = document.getElementById('dispensed-capsule');
            cap.classList.add('hidden'); cap.classList.remove('animate-drop', 'ball-glow');
            lastWonItemImageUrl = ""; lastWonItemName = "";
            currentState = STATE.IDLE;

            // 戦闘BGMを停止し、オープニングBGMを最初から再開する
            bgmBattle.pause();
            bgmBattle.currentTime = 0;
            if (soundEnabled && isOpStarted) {
                bgmOp.currentTime = 0; // 曲を最初から流す
                bgmOp.play().catch(e=>{});
            }
        });

        // 起動時
        updateLanguage('jp');
    </script>
</body>
</html>
